<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Botanical Engine | Auto-ID Edition</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #020617; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(15, 23, 42, 0.95); padding: 20px; border-radius: 16px; border: 1px solid #334155; width: 320px; max-height: 90vh; overflow-y: auto; backdrop-filter: blur(10px); }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; box-sizing: border-box; }
        .label { font-size: 0.65rem; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-top: 5px; }
        h2 { margin: 0 0 5px 0; font-size: 1.1rem; color: #4ade80; }
        #id-badge { background: #16a34a; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .id-unknown { background: #475569 !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <h2>Botanical ID Lab</h2>
    <div id="id-badge" class="id-unknown">Identifying...</div>
    
    <div class="label">Formula Input</div>
    <input type="text" id="formulaInput" value="K4 C4 A6 G2">

    <div class="label">Library Presets</div>
    <select id="presetSelect">
        <option value="">-- Select a Family --</option>
        <option value="K4 C4 A6 G2">Brassicaceae (Mustard)</option>
        <option value="K(5) C(5) A5 G2">Solanaceae (Nightshade)</option>
        <option value="K3 C3 A6 G3">Liliaceae (Lily)</option>
        <option value="EpiK7 K(5) C5 Ainf G5">Malvaceae (Hibiscus)</option>
        <option value="K(5) C5 Ainf G10">Rosaceae (Rose)</option>
        <option value="K(5) C5 A(9)1 G1">Fabaceae (Pea)</option>
        <option value="K0 C(5) A(5) G2_inf">Asteraceae (Sunflower)</option>
        <option value="K(5) C(5) A2+2 G2">Lamiaceae (Mint)</option>
        <option value="K5 C5 A10 G5">Geraniaceae (Geranium)</option>
        <option value="K3 C3 A1 G3">Orchidaceae (Orchid)</option>
    </select>

    <div class="label">Visual Dissection</div>
    <input type="range" id="explodeSlider" min="0" max="15" step="0.1" value="0">

    <div class="label">Morphology Controls</div>
    <select id="shapeC"><option value="capsule">Petal: Capsule</option><option value="box">Petal: Flat</option></select>
    <select id="shapeA"><option value="stalk">Stamen: Filament</option><option value="sphere">Stamen: Simple</option></select>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls;
    let whorls = { EpiK: null, K: null, C: null, A: null, G: null };
    
    const familyDatabase = {
        "K4 C4 A6 G2": "Brassicaceae (Mustard Family)",
        "K(5) C(5) A5 G2": "Solanaceae (Nightshade Family)",
        "K3 C3 A6 G3": "Liliaceae (Lily Family)",
        "EpiK7 K(5) C5 Ainf G5": "Malvaceae (Hibiscus Family)",
        "K(5) C5 Ainf G10": "Rosaceae (Rose Family)",
        "K(5) C5 A(9)1 G1": "Fabaceae (Pea Family)",
        "K0 C(5) A(5) G2_inf": "Asteraceae (Sunflower Family)",
        "K(5) C(5) A2+2 G2": "Lamiaceae (Mint Family)",
        "K5 C5 A10 G5": "Geraniaceae (Geranium Family)",
        "K3 C3 A1 G3": "Orchidaceae (Orchid Family)"
    };

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 25, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        scene.add(light);

        document.getElementById('formulaInput').addEventListener('input', updateModel);
        document.getElementById('presetSelect').addEventListener('change', e => {
            if(e.target.value) {
                document.getElementById('formulaInput').value = e.target.value;
                updateModel();
            }
        });
        document.getElementById('explodeSlider').addEventListener('input', updateExplosion);
        ['shapeC', 'shapeA'].forEach(id => document.getElementById(id).addEventListener('change', updateModel));

        updateModel();
    }

    function updateModel() {
        Object.values(whorls).forEach(g => { if(g) scene.remove(g); });
        
        const formula = document.getElementById('formulaInput').value.trim();
        identifyFamily(formula);

        const parse = (tag) => {
            const m = formula.match(new RegExp(tag + "(\\d+|inf|\\(inf\\)|\\(\\d+\\)|\\d+\\+\\d+|\\(9\\)1)"));
            if (!m) return null;
            let val = m[1].replace(/[()]/g, '');
            if(val.includes('+')) val = val.split('+').reduce((a,b)=>parseInt(a)+parseInt(b));
            if(val === '91') val = 10; // Special case for Fabaceae
            return { n: val === 'inf' ? 45 : parseInt(val), isInf: val === 'inf' };
        };

        const config = [
            { id: 'EpiK', data: parse('EpiK'), r: 14, c: 0x84cc16, type: 'sep' },
            { id: 'K',    data: parse('K'),    r: 11, c: 0x16a34a, type: 'sep' },
            { id: 'C',    data: parse('C'),    r: 8.5, c: 0xdb2777, type: 'petal' },
            { id: 'A',    data: parse('A'),    r: 5.5, c: 0xeab308, type: 'stamen' },
            { id: 'G',    data: parse('G'),    r: 2,   c: 0x9333ea, type: 'carpel' }
        ];

        config.forEach(item => {
            if(item.data) {
                whorls[item.id] = createWhorl(item);
                scene.add(whorls[item.id]);
            }
        });
        updateExplosion();
    }

    function identifyFamily(formula) {
        const badge = document.getElementById('id-badge');
        const match = familyDatabase[formula];
        if (match) {
            badge.innerText = match;
            badge.classList.remove('id-unknown');
        } else {
            badge.innerText = "Unknown / Hybrid Formula";
            badge.classList.add('id-unknown');
        }
    }

    function createWhorl({data, r, c, type}) {
        const group = new THREE.Group();
        const petalShape = document.getElementById('shapeC').value;
        const stamenShape = document.getElementById('shapeA').value;

        for (let i = 0; i < data.n; i++) {
            const ang = (i / data.n) * Math.PI * 2;
            const dist = data.isInf ? r + (Math.random()-0.5)*3 : r;
            const x = Math.cos(ang) * dist;
            const z = Math.sin(ang) * dist;
            const mat = new THREE.MeshPhongMaterial({ color: c, side: THREE.DoubleSide });

            let mesh;
            if (type === 'sep') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8, 0, Math.PI), mat);
                mesh.rotation.set(Math.PI/2, 0, ang + Math.PI/2);
            } else if (type === 'petal') {
                mesh = new THREE.Mesh(petalShape === 'capsule' ? new THREE.CapsuleGeometry(0.8, 2) : new THREE.BoxGeometry(2, 0.2, 3), mat);
                mesh.rotation.set(0.3, -ang, 0);
            } else if (type === 'stamen') {
                if(stamenShape === 'stalk') {
                    mesh = new THREE.Group();
                    const fil = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3), new THREE.MeshPhongMaterial({color: 0xffeeaa}));
                    const ant = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.3), mat);
                    ant.position.y = 1.5; mesh.add(fil); mesh.add(ant);
                } else {
                    mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5), mat);
                }
                if(data.isInf) mesh.position.y = Math.random() * 3;
            } else if (type === 'carpel') {
                mesh = new THREE.Mesh(new THREE.TorusGeometry(1, 0.4), mat);
                mesh.rotation.x = Math.PI/2;
            }

            if(mesh) { mesh.position.set(x, mesh.position.y || 0, z); group.add(mesh); }
        }
        return group;
    }

    function updateExplosion() {
        const f = parseFloat(document.getElementById('explodeSlider').value);
        const layers = ['EpiK', 'K', 'C', 'A', 'G'];
        layers.forEach((l, i) => { if(whorls[l]) whorls[l].position.y = f * i; });
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
</script>
</body>
</html>
