<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Botanical Engine v4.0 | Pro Labels</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #1e293b; }
        .card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 700px; text-align: center; border: 1px solid #e2e8f0; }
        .ui-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        input { padding: 14px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 1.1rem; grid-column: span 2; }
        select { padding: 12px; border-radius: 12px; border: 2px solid #cbd5e1; background: white; font-weight: 600; }
        canvas { background: #fff; margin: 10px 0; border-radius: 16px; }
        .controls-bottom { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-dl { background: #0f172a; color: white; }
        .btn-dl:hover { background: #334155; }
        .btn-reset { background: #f1f5f9; color: #475569; }
        .label-hint { font-size: 0.8rem; color: #64748b; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="font-size: 1.5rem; margin-bottom: 20px;">Botanical Diagram Engine</h1>
    
    <div class="ui-grid">
        <select id="presetSelect" onchange="loadPreset()">
            <option value="">-- Choose Plant Family --</option>
            <option value="radial|K4 C4 A6 G2|Brassicaceae (Mustard)">Mustard Family</option>
            <option value="bilateral|K(5) C5 A(9)1 G1|Fabaceae (Pea)">Pea Family</option>
            <option value="radial|K(5) C(5) A5 G2|Solanaceae (Nightshade)">Nightshade Family</option>
            <option value="radial|K3 C3 A6 G(3)|Liliaceae (Lily)">Lily Family</option>
            <option value="radial|EpiK7 K(5) C5 A20 G(5)|Malvaceae (Hibiscus)">Mallow Family</option>
            <option value="radial|K0 C(5) A(5) G2_inf|Asteraceae (Sunflower)">Sunflower Family</option>
        </select>
        <select id="symmetry" onchange="draw()">
            <option value="radial">⊕ Actinomorphic</option>
            <option value="bilateral">% Zygomorphic</option>
        </select>
        <input type="text" id="formulaInput" value="K(5) C5 A10 G(3)" oninput="draw()" placeholder="Formula: K(5) C5 A10 G2">
    </div>

    <canvas id="flowerCanvas" width="600" height="600"></canvas>

    <div class="controls-bottom">
        <button class="btn-reset" onclick="location.reload()">Reset</button>
        <button class="btn-dl" onclick="downloadPNG()">Download PNG</button>
    </div>

    <p class="label-hint">
        <b>G_inf</b> = Inferior Ovary | <b>(N)</b> = Fused Parts | <b>EpiK</b> = Epicalyx<br>
        Labels are automatically generated based on the formula provided.
    </p>
</div>

<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');
    let familyName = "";

    function loadPreset() {
        const preset = document.getElementById('presetSelect').value;
        if (!preset) return;
        const [sym, form, name] = preset.split('|');
        document.getElementById('symmetry').value = sym;
        document.getElementById('formulaInput').value = form;
        familyName = name;
        draw();
    }

    function draw() {
        const input = document.getElementById('formulaInput').value;
        const sym = document.getElementById('symmetry').value;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2, cy = canvas.height / 2 + 40;

        // Draw Family Name
        ctx.font = "bold 16px Segoe UI";
        ctx.fillStyle = "#1e293b";
        ctx.textAlign = "center";
        ctx.fillText(familyName, cx, 30);

        // Symmetry Axis Marker
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 2; ctx.beginPath();
        if (sym === 'radial') { 
            ctx.arc(cx, 70, 10, 0, 7); ctx.moveTo(cx-10, 70); ctx.lineTo(cx+10, 70); ctx.moveTo(cx, 60); ctx.lineTo(cx, 80); 
        } else { 
            ctx.moveTo(cx, 55); ctx.lineTo(cx, 85); ctx.moveTo(cx-15, 70); ctx.lineTo(cx+15, 70); 
        }
        ctx.stroke();

        const parse = (tag) => {
            const m = input.match(new RegExp(tag + "(\\d+|\\(\\d+\\))"));
            if (!m) return null;
            return { n: parseInt(m[1].replace(/[()]/g, '')), f: m[1].includes('(') };
        };

        const layers = [
            { d: parse('EpiK'), r: 230, c: '#84cc16', t: 'arc', name: "Epicalyx" },
            { d: parse('K'),    r: 190, c: '#16a34a', t: 'arc', name: "Sepals (K)" },
            { d: parse('C'),    r: 140, c: '#db2777', t: 'petal', name: "Petals (C)" },
            { d: parse('A'),    r: 90,  c: '#eab308', t: 'stamen', name: "Stamens (A)" },
            { d: parse('G'),    r: 40,  c: '#9333ea', t: 'carpel', name: "Carpels (G)" }
        ];

        layers.forEach(l => { 
            if (l.d && l.d.n > 0) {
                renderLayer(cx, cy, l);
                // Draw Label
                ctx.font = "10px Segoe UI";
                ctx.fillStyle = "#94a3b8";
                ctx.fillText(l.name, cx + l.r, cy - 5);
            }
        });

        // Ovary Position Line
        if (input.includes('G')) {
            ctx.strokeStyle = '#9333ea'; ctx.lineWidth = 3; ctx.beginPath();
            const yOffset = input.includes('_inf') ? -55 : 55;
            ctx.moveTo(cx-25, cy + yOffset); ctx.lineTo(cx+25, cy + yOffset);
            ctx.stroke();
            ctx.font = "italic 11px Segoe UI";
            ctx.fillText(input.includes('_inf') ? "Inferior" : "Superior", cx, cy + yOffset + (yOffset > 0 ? 15 : -10));
        }
    }

    function renderLayer(cx, cy, l) {
        ctx.fillStyle = ctx.strokeStyle = l.c;
        for (let i = 0; i < l.d.n; i++) {
            const ang = (i * 2 * Math.PI) / l.d.n - Math.PI/2;
            const x = cx + l.r * Math.cos(ang), y = cy + l.r * Math.sin(ang);
            ctx.beginPath();
            if (l.t === 'arc') { 
                ctx.arc(x, y, 20, ang + 0.8, ang - 0.8, true); 
                ctx.lineWidth = 4; ctx.stroke(); 
            } else if (l.t === 'petal') { 
                ctx.ellipse(x, y, 38, 18, ang + Math.PI/2, 0, 7); ctx.fill(); 
            } else if (l.t === 'stamen') { 
                ctx.arc(x, y, 7, 0, 7); ctx.fill(); ctx.stroke(); 
            } else if (l.t === 'carpel') { 
                ctx.arc(cx, cy, l.r, ang, ang + (2*Math.PI/l.d.n) - 0.2); 
                ctx.lineWidth = 5; ctx.stroke(); 
            }
        }
        if (l.d.f) { 
            ctx.setLineDash([5, 5]); ctx.lineWidth = 1; ctx.beginPath(); 
            ctx.arc(cx, cy, l.r, 0, 7); ctx.stroke(); ctx.setLineDash([]); 
        }
    }

    function downloadPNG() {
        const link = document.createElement('a');
        link.download = `floral-diagram-${familyName || 'custom'}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }
    draw();
</script>
</body>
</html>
