<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Floral Formula Lab | Pro Version</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #0a0a0a; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 16px; border: 1px solid #334155; width: 280px; backdrop-filter: blur(10px); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        .label { font-size: 0.75rem; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        h2 { margin: 0 0 15px 0; font-size: 1.1rem; color: #4ade80; }
        #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #475569; pointer-events: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="ui">
    <h2>3D Floral Engine</h2>
    <div class="label">Presets</div>
    <select id="presetSelect">
        <option value="K(5) C5 A10 G3">Custom Formula</option>
        <option value="K4 C4 A6 G2">Brassicaceae (Mustard)</option>
        <option value="K(5) C(5) A5 G2">Solanaceae (Potato)</option>
        <option value="K3 C3 A6 G(3)">Liliaceae (Lily)</option>
        <option value="K(5) C5 A20 G5">Malvaceae (Hibiscus)</option>
    </select>
    <div class="label">Formula Input</div>
    <input type="text" id="formulaInput" value="K(5) C5 A10 G3">
    <div style="font-size: 0.7rem; color: #64748b; margin-top: 10px;">• Left Click: Rotate<br>• Right Click: Pan<br>• Scroll: Zoom</div>
</div>

<div id="instructions">Interactive 3D Botanical Model</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, flowerGroup;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffffff, 100);
        spotLight.position.set(10, 20, 10);
        scene.add(spotLight);

        flowerGroup = new THREE.Group();
        scene.add(flowerGroup);

        // Listeners
        document.getElementById('formulaInput').addEventListener('input', updateModel);
        document.getElementById('presetSelect').addEventListener('change', (e) => {
            document.getElementById('formulaInput').value = e.target.value;
            updateModel();
        });

        updateModel();
    }

    function updateModel() {
        // Clear existing objects safely
        while(flowerGroup.children.length > 0) {
            const obj = flowerGroup.children[0];
            if(obj.geometry) obj.geometry.dispose();
            if(obj.material) obj.material.dispose();
            flowerGroup.remove(obj);
        }
        
        const formula = document.getElementById('formulaInput').value;
        const parse = (tag) => {
            const m = formula.match(new RegExp(tag + "(\\d+|\\(\\d+\\))"));
            if (!m) return null;
            return { n: parseInt(m[1].replace(/[()]/g, '')), f: m[1].includes('(') };
        };

        const layers = [
            { d: parse('K'), r: 10,  c: 0x22c55e, t: 'sepal' },
            { d: parse('C'), r: 7.5, c: 0xec4899, t: 'petal' },
            { d: parse('A'), r: 4.5, c: 0xeab308, t: 'stamen' },
            { d: parse('G'), r: 1.5, c: 0xa855f7, t: 'carpel' }
        ];

        layers.forEach(layer => {
            if (layer.d) createWhorl(layer.d.n, layer.r, layer.c, layer.t);
        });
    }

    function createWhorl(n, radius, color, type) {
        for (let i = 0; i < n; i++) {
            const angle = (i / n) * Math.PI * 2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;

            const material = new THREE.MeshPhongMaterial({ color: color, side: THREE.DoubleSide });

            if (type === 'sepal') {
                const geom = new THREE.SphereGeometry(1.5, 16, 16, 0, Math.PI);
                const mesh = new THREE.Mesh(geom, material);
                mesh.position.set(x, 0, z);
                mesh.rotation.x = Math.PI / 2;
                mesh.rotation.z = angle + Math.PI / 2;
                flowerGroup.add(mesh);
            } 
            else if (type === 'petal') {
                const geom = new THREE.CapsuleGeometry(1, 2, 4, 16);
                geom.scale(1.5, 0.2, 2);
                const mesh = new THREE.Mesh(geom, material);
                mesh.position.set(x, 0.5, z);
                mesh.rotation.y = -angle;
                mesh.rotation.z = 0.3;
                flowerGroup.add(mesh);
            } 
            else if (type === 'stamen') {
                const group = new THREE.Group();
                const filGeom = new THREE.CylinderGeometry(0.05, 0.05, 4);
                const fil = new THREE.Mesh(filGeom, new THREE.MeshPhongMaterial({color: 0xffffee}));
                const antGeom = new THREE.BoxGeometry(0.4, 0.6, 0.3);
                const ant = new THREE.Mesh(antGeom, material);
                ant.position.y = 2;
                group.add(fil); group.add(ant);
                group.position.set(x, 2, z);
                flowerGroup.add(group);
            } 
            else if (type === 'carpel') {
                const geom = new THREE.TorusGeometry(0.8, 0.4, 16, 32);
                const mesh = new THREE.Mesh(geom, material);
                mesh.rotation.x = Math.PI / 2;
                mesh.position.set(x, 1, z);
                flowerGroup.add(mesh);
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
