<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Botanical Engine | Pro Features</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #020617; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 16px; border: 1px solid #334155; width: 300px; backdrop-filter: blur(10px); }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        .label { font-size: 0.7rem; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-top: 10px; }
        h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: #4ade80; }
        .hint { font-size: 0.7rem; color: #64748b; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui">
    <h2>Advanced Floral Lab</h2>
    
    <div class="label">Presets</div>
    <select id="presetSelect">
        <option value="radial|EpiK7 K(5) C5 Ainf G(5)|Hibiscus (Superior Ovary + Epicalyx)">Hibiscus (EpiK + Superior)</option>
        <option value="radial|K0 C(5) A(5) G(2)_inf|Sunflower (Inferior Ovary)">Sunflower (Inferior Ovary)</option>
        <option value="radial|K5 C5 Ainf G10|Rose (Infinite Stamens)">Wild Rose (Infinite A)</option>
        <option value="radial|K(5) C(5) A5 G2|Solanaceae (Standard)">Nightshade Family</option>
    </select>

    <div class="label">Formula</div>
    <input type="text" id="formulaInput" value="EpiK7 K(5) C5 Ainf G(5)">

    <div class="label">Dissect / Explode</div>
    <input type="range" id="explodeSlider" min="0" max="15" step="0.1" value="0">

    <div class="hint">
        <b>EpiK</b>: Epicalyx | <b>Ainf</b>: Infinite Stamens<br>
        <b>G_inf</b>: Inferior Ovary (line above)
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls;
    let whorls = { EpiK: null, K: null, C: null, A: null, G: null, GLine: null };

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 30);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        document.getElementById('formulaInput').addEventListener('input', updateModel);
        document.getElementById('explodeSlider').addEventListener('input', updateExplosion);
        document.getElementById('presetSelect').addEventListener('change', (e) => {
            const [sym, form] = e.target.value.split('|');
            document.getElementById('formulaInput').value = form;
            updateModel();
        });

        updateModel();
    }

    function updateModel() {
        Object.values(whorls).forEach(g => { if(g) scene.remove(g); });

        const formula = document.getElementById('formulaInput').value;
        const parse = (tag) => {
            const m = formula.match(new RegExp(tag + "(\\d+|inf|\\(inf\\)|\\(\\d+\\))"));
            if (!m) return null;
            const val = m[1].replace(/[()]/g, '');
            return { n: val === 'inf' ? 60 : parseInt(val), f: m[1].includes('('), isInf: val === 'inf' };
        };

        whorls.EpiK = createWhorl(parse('EpiK'), 14, 0x84cc16, 'sep');
        whorls.K = createWhorl(parse('K'), 11, 0x16a34a, 'sep');
        whorls.C = createWhorl(parse('C'), 8, 0xdb2777, 'petal');
        whorls.A = createWhorl(parse('A'), 5, 0xeab308, 'stamen');
        whorls.G = createWhorl(parse('G'), 2, 0x9333ea, 'carpel');

        // Draw Ovary Position Line
        if (formula.includes('G')) {
            const lineGeom = new THREE.TorusGeometry(3, 0.05, 16, 100);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0x9333ea });
            whorls.GLine = new THREE.Mesh(lineGeom, lineMat);
            whorls.GLine.rotation.x = Math.PI/2;
            scene.add(whorls.GLine);
        }

        Object.values(whorls).forEach(g => { if(g) scene.add(g); });
        updateExplosion();
    }

    function createWhorl(data, radius, color, type) {
        if (!data || data.n <= 0) return null;
        const group = new THREE.Group();
        
        for (let i = 0; i < data.n; i++) {
            const angle = (i / data.n) * Math.PI * 2;
            const off = data.isInf ? (Math.random() - 0.5) * 2 : 0;
            const r = radius + off;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            const mat = new THREE.MeshPhongMaterial({ color: color, side: THREE.DoubleSide });

            let mesh;
            if (type === 'sep') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8, 0, Math.PI), mat);
                mesh.rotation.set(Math.PI/2, 0, angle + Math.PI/2);
            } else if (type === 'petal') {
                mesh = new THREE.Mesh(new THREE.CapsuleGeometry(1, 2, 2, 8), mat);
                mesh.scale.set(1.5, 0.2, 2);
                mesh.rotation.set(0.3, -angle, 0);
            } else if (type === 'stamen') {
                mesh = new THREE.Group();
                const fil = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3), new THREE.MeshPhongMaterial({color: 0xffeeaa}));
                const ant = new THREE.Mesh(new THREE.SphereGeometry(0.3), mat);
                ant.position.y = 1.5; mesh.add(fil); mesh.add(ant);
                if(data.isInf) mesh.position.y = Math.random() * 2;
            } else if (type === 'carpel') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), mat);
            }
            
            if(mesh) { mesh.position.set(x, mesh.position.y || 0, z); group.add(mesh); }
        }
        return group;
    }

    function updateExplosion() {
        const f = parseFloat(document.getElementById('explodeSlider').value);
        const formula = document.getElementById('formulaInput').value;
        if(whorls.EpiK) whorls.EpiK.position.y = 0;
        if(whorls.K) whorls.K.position.y = f * 1;
        if(whorls.C) whorls.C.position.y = f * 2;
        if(whorls.A) whorls.A.position.y = f * 3;
        if(whorls.G) {
            whorls.G.position.y = f * 4;
            if(whorls.GLine) {
                const isInf = formula.includes('_inf');
                whorls.GLine.position.y = whorls.G.position.y + (isInf ? 1.5 : -1.5);
            }
        }
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
</script>
</body>
</html>
