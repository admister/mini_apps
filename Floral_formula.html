<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Botanical Studio | Floral Formula</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #2c3e50; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 600px; text-align: center; border: 1px solid #eee; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        input { padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1.1rem; width: 60%; transition: all 0.3s; }
        input:focus { border-color: #4CAF50; outline: none; box-shadow: 0 0 8px rgba(76, 175, 80, 0.2); }
        select { padding: 10px; border-radius: 10px; border: 2px solid #e0e0e0; cursor: pointer; background: white; }
        canvas { background: #fff; margin: 20px 0; border: 1px solid #fafafa; }
        .btn-download { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-download:hover { background: #2980b9; }
        .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 300px; margin: 20px auto; font-size: 0.85rem; }
        .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Floral Diagram Engine</h2>
    
    <div class="controls">
        <select id="symmetry" onchange="draw()">
            <option value="radial">⊕ Actinomorphic</option>
            <option value="bilateral">% Zygomorphic</option>
        </select>
        <input type="text" id="formulaInput" value="K(5) C5 A10 G(3)" placeholder="K5 C5 A10 G5" oninput="draw()">
    </div>

    <canvas id="flowerCanvas" width="500" height="500"></canvas>

    <div class="legend">
        <div><span class="swatch" style="background:#2E7D32"></span>Sepals (K)</div>
        <div><span class="swatch" style="background:#E91E63"></span>Petals (C)</div>
        <div><span class="swatch" style="background:#FFC107"></span>Stamens (A)</div>
        <div><span class="swatch" style="background:#9C27B0"></span>Carpels (G)</div>
    </div>

    <button class="btn-download" onclick="downloadDiagram()">Download Diagram (.PNG)</button>
    <p style="font-size: 0.8rem; color: #999; margin-top: 15px;">Supports K, C, A, G and (N) for fusion.</p>
</div>

<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');

    function draw() {
        const input = document.getElementById('formulaInput').value;
        const sym = document.getElementById('symmetry').value;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2 + 30;

        // 1. Draw Mother Axis
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#333';
        if (sym === 'radial') {
            ctx.beginPath(); ctx.arc(cx, 50, 8, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-8, 50); ctx.lineTo(cx+8, 50); ctx.moveTo(cx, 42); ctx.lineTo(cx, 58); ctx.stroke();
        } else {
            ctx.beginPath(); ctx.moveTo(cx, 35); ctx.lineTo(cx, 65); ctx.moveTo(cx-12, 50); ctx.lineTo(cx+12, 50); ctx.stroke();
        }

        const parse = (tag) => {
            const match = input.match(new RegExp(tag + "(\\d+|\\(\\d+\\))"));
            if (!match) return null;
            const raw = match[1];
            return { count: parseInt(raw.replace(/[()]/g, '')), fused: raw.includes('(') };
        };

        const layers = [
            { data: parse('K'), r: 180, col: '#2E7D32', type: 'sepal' },
            { data: parse('C'), r: 135, col: '#E91E63', type: 'petal' },
            { data: parse('A'), r: 90,  col: '#FFC107', type: 'stamen' },
            { data: parse('G'), r: 40,  col: '#9C27B0', type: 'carpel' }
        ];

        layers.forEach(layer => {
            if (layer.data && layer.data.count > 0) {
                renderWhorl(cx, cy, layer);
            }
        });
    }

    function renderWhorl(cx, cy, layer) {
        const { count, fused } = layer.data;
        ctx.fillStyle = ctx.strokeStyle = layer.col;
        
        for (let i = 0; i < count; i++) {
            const angle = (i * 2 * Math.PI) / count - Math.PI/2;
            const x = cx + layer.r * Math.cos(angle);
            const y = cy + layer.r * Math.sin(angle);

            ctx.beginPath();
            if (layer.type === 'sepal') {
                ctx.arc(x, y, 22, angle + 0.8, angle - 0.8, true);
                ctx.lineWidth = 5; ctx.stroke();
            } else if (layer.type === 'petal') {
                ctx.ellipse(x, y, 35, 18, angle + Math.PI/2, 0, Math.PI*2);
                ctx.fill();
            } else if (layer.type === 'stamen') {
                ctx.arc(x, y, 7, 0, 7); ctx.fill();
                ctx.stroke();
            } else if (layer.type === 'carpel') {
                ctx.arc(cx, cy, layer.r, angle, angle + (2*Math.PI/count) - 0.2);
                ctx.lineWidth = 4; ctx.stroke();
            }
        }

        if (fused && count > 1) {
            ctx.setLineDash([5, 5]); ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(cx, cy, layer.r, 0, Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    function downloadDiagram() {
        const link = document.createElement('a');
        link.download = 'floral-diagram.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    draw(); // Initial call
</script>

</body>
</html>
